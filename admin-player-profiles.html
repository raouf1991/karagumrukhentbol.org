<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Oyuncu Profilleri</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#eef1f5;color:#111}.wrap{max-width:1100px;margin:auto;padding:25px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.panel,.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 8px 28px #0002;margin-top:18px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.field{display:grid;gap:6px}.field input,.field textarea,.field select{padding:11px;border:1px solid #ccd1d8;border-radius:8px;width:100%}.field textarea{min-height:100px}.full{grid-column:1/-1}.btn{border:0;border-radius:8px;padding:11px 15px;font-weight:700;cursor:pointer}.red{background:#d50909;color:#fff}.dark{background:#111;color:#fff}.hidden{display:none}.list .card{display:grid;grid-template-columns:85px 1fr auto;gap:15px;align-items:center}.list img{width:85px;height:100px;object-fit:cover;border-radius:8px}@media(max-width:750px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.list .card{grid-template-columns:70px 1fr}.list .card button{grid-column:1/-1}}</style></head><body><main class="wrap"><div class="top"><div><h1>Oyuncu / Antrenör Profilleri</h1><p id="user"></p></div><a class="btn dark" href="admin.html">Ana Yönetim</a></div><div class="panel"><form id="form" class="grid"><input type="hidden" name="id"><div class="field"><label>Kişi seç</label><select id="person" required></select></div><div class="field"><label>Profil türü</label><select name="profile_type"><option value="player">Oyuncu</option><option value="coach">Antrenör</option></select></div><div class="field"><label>Doğum tarihi</label><input type="date" name="birth_date"></div><div class="field"><label>Uyruk</label><input name="nationality"></div><div class="field"><label>Boy (cm)</label><input type="number" name="height_cm"></div><div class="field"><label>Kullandığı el</label><select name="dominant_hand"><option value="">—</option><option>Sağ</option><option>Sol</option></select></div><div class="field"><label>Kulübe katılım tarihi</label><input type="date" name="joined_at"></div><div class="field"><label>Bu sezon gol sayısı</label><input type="number" min="0" name="season_goals"></div><div class="field full"><label>Önceki kulüpler</label><textarea name="previous_clubs"></textarea></div><div class="field full"><label>Hakkında / Özgeçmiş</label><textarea name="bio_tr"></textarea></div><div class="field full"><label>Antrenörlük belgeleri</label><textarea name="coaching_licenses"></textarea></div><div class="field full"><label>Başarılar</label><textarea name="achievements"></textarea></div><div class="full"><button class="btn red" type="submit">Profili Kaydet</button></div></form></div><div id="list" class="list"></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script><script src="supabase-config.js"></script><script src="admin-player-profiles.js?v=20260721-1"></script></body></html>
