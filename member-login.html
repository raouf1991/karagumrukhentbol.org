<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Üye Girişi | Karagümrük Hentbol</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#090909,#1b1b1b);color:#fff;min-height:100vh;display:grid;place-items:center;padding:24px}.box{width:min(460px,100%);background:#131313;border:1px solid #333;border-radius:22px;padding:30px;box-shadow:0 25px 70px #0008}.logo{width:95px;height:95px;object-fit:contain;background:#fff;border-radius:50%;display:block;margin:auto}.eyebrow{color:#ef3d2d;font-weight:800;letter-spacing:.12em;text-align:center;margin-top:18px}.box h1{text-align:center;margin:8px 0}.muted{color:#bbb;line-height:1.6;text-align:center}.field{display:grid;gap:8px;margin:18px 0}.field input{width:100%;padding:14px;border-radius:10px;border:1px solid #444;background:#090909;color:#fff;font-size:16px}.btn{width:100%;padding:14px;border:0;border-radius:10px;background:#d71913;color:#fff;font-weight:800;cursor:pointer}.btn:disabled{opacity:.6}.msg{min-height:24px;margin-top:14px;text-align:center;color:#ff8c80}.links{text-align:center;margin-top:20px}.links a{color:#ddd}</style></head><body><main class="box"><img class="logo" src="assets/club-logo.png" alt="Karagümrük"><div class="eyebrow">ÜYE PORTALI</div><h1>Üye Girişi</h1><p class="muted">Kabul edilen üyeliğinizde kullandığınız e-posta adresini yazın. Size güvenli giriş bağlantısı göndereceğiz.</p><form id="loginForm"><div class="field"><label>E-posta</label><input id="email" type="email" autocomplete="email" required placeholder="ornek@email.com"></div><button id="submitBtn" class="btn" type="submit">Giriş Bağlantısı Gönder</button><div id="message" class="msg"></div></form><div class="links"><a href="index.html">Ana sayfaya dön</a></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script><script src="supabase-config.js?v=20260719"></script><script>const cfg=window.KH_SUPABASE||{},msg=document.getElementById('message'),btn=document.getElementById('submitBtn');const db=window.supabase.createClient(cfg.url,cfg.publishableKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});db.auth.getSession().then(({data})=>{if(data.session)location.href='member-panel.html'});document.getElementById('loginForm').addEventListener('submit',async e=>{e.preventDefault();btn.disabled=true;msg.textContent='';try{const email=document.getElementById('email').value.trim();const {error}=await db.auth.signInWithOtp({email,options:{emailRedirectTo:new URL('member-panel.html',location.href).href,shouldCreateUser:true}});if(error)throw error;msg.style.color='#9be09b';msg.textContent='Giriş bağlantısı e-posta adresinize gönderildi.';}catch(err){msg.style.color='#ff8c80';msg.textContent=err.message||String(err)}finally{btn.disabled=false}});</script></body></html>
