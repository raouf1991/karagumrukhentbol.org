<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Üye Paneli | Karagümrük Hentbol</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#eef1f5;color:#111}.hidden{display:none!important}.top{background:#101010;color:#fff;padding:18px 5vw;display:flex;justify-content:space-between;align-items:center;gap:16px}.brand{display:flex;align-items:center;gap:12px}.brand img{width:56px;height:56px;object-fit:contain;background:#fff;border-radius:50%}.top button{border:1px solid #555;background:#202020;color:#fff;border-radius:9px;padding:10px 14px;cursor:pointer}.wrap{width:min(1100px,92%);margin:28px auto}.hero,.panel{background:#fff;border-radius:18px;box-shadow:0 8px 30px #0001}.hero{display:grid;grid-template-columns:150px 1fr;gap:24px;padding:26px;border-top:5px solid #d71913}.photo{width:140px;height:170px;object-fit:cover;border-radius:14px;background:#ddd}.status{display:inline-block;padding:8px 12px;border-radius:30px;font-weight:800}.active{background:#dff5e4;color:#166534}.expired{background:#fee2e2;color:#991b1b}.soon{background:#fff1c2;color:#8a5b00}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}.panel{padding:22px;margin-top:20px}.label{font-size:13px;color:#666}.value{font-size:19px;font-weight:800;margin-top:5px}.btn{border:0;border-radius:9px;padding:12px 16px;font-weight:800;cursor:pointer}.primary{background:#d71913;color:#fff}.dark{background:#171717;color:#fff}.btn:disabled{opacity:.55}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.renewal{border-left:4px solid #d71913;padding:14px;background:#f7f7f8;border-radius:8px;margin:10px 0}.message{text-align:center;padding:50px 20px}.card-preview{background:linear-gradient(135deg,#090909 0 72%,#7a0000 72%);color:#fff;padding:24px;border-radius:16px;min-height:250px;position:relative}.card-preview h2{margin:0}.number{font-size:24px;font-weight:900;margin-top:25px}.card-photo{width:92px;height:112px;object-fit:cover;border-radius:10px;border:3px solid #fff;float:right}.small{color:#bbb}.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:13px 18px;border-radius:9px;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:750px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.photo{width:120px;height:145px}}</style></head><body><header class="top"><div class="brand"><img src="assets/club-logo.png" alt=""><div><strong>Karagümrük Hentbol</strong><br><small>Üye Paneli</small></div></div><button id="logout">Çıkış</button></header><main class="wrap"><div id="loading" class="panel message">Üyelik bilgileriniz yükleniyor...</div><div id="noMembership" class="panel message hidden"><h2>Aktif üyelik bulunamadı</h2><p id="noMembershipText">Bu panele yalnızca kabul edilmiş üyelik başvurusunda kullanılan e-posta adresiyle erişebilirsiniz.</p><a href="member-login.html">Tekrar giriş yap</a></div><section id="content" class="hidden"><div class="hero"><img id="photo" class="photo" src="assets/club-logo.png" alt="Üye"><div><span id="status" class="status"></span><h1 id="name"></h1><p id="type"></p><div class="grid"><div><div class="label">Üyelik Numarası</div><div id="number" class="value"></div></div><div><div class="label">Başlangıç</div><div id="approved" class="value"></div></div><div><div class="label">Geçerlilik</div><div id="valid" class="value"></div></div></div><div class="actions"><button id="printCard" class="btn dark">Kartı Yazdır / PDF Kaydet</button><button id="emailCard" class="btn dark">Kartı E-postama Gönder</button><button id="renewBtn" class="btn primary hidden">Üyeliği Yenile</button></div></div></div><div class="panel"><h2>Dijital Üyelik Kartı</h2><div id="card" class="card-preview"></div></div><div class="panel"><h2>Yenileme Taleplerim</h2><div id="renewals"></div></div></section></main><div id="toast" class="toast"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script><script src="supabase-config.js?v=20260719"></script><script>const cfg=window.KH_SUPABASE||{},db=window.supabase.createClient(cfg.url,cfg.publishableKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});let member=null;const $=s=>document.querySelector(s),fmt=v=>v?new Intl.DateTimeFormat('tr-TR',{day:'2-digit',month:'long',year:'numeric'}).format(new Date(v)):'—',esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function toast(t,e=false){const x=$('#toast');x.textContent=t;x.style.background=e?'#8b0000':'#111';x.classList.add('show');setTimeout(()=>x.classList.remove('show'),3500)}function daysUntil(v){return Math.ceil((new Date(v)-new Date())/86400000)}async function load(){const {data:{session},error:sessionError}=await db.auth.getSession();if(sessionError||!session)return location.href='member-login.html';let data=null,error=null;const rpc=await db.rpc('get_my_membership');if(!rpc.error&&rpc.data){data=Array.isArray(rpc.data)?rpc.data[0]:rpc.data}else{const email=(session.user.email||'').trim().toLowerCase();const fallback=await db.from('membership_requests').select('*').ilike('email',email).eq('status','accepted').eq('member_portal_enabled',true).order('approved_at',{ascending:false}).limit(1).maybeSingle();data=fallback.data;error=fallback.error||rpc.error}$('#loading').classList.add('hidden');if(error||!data){$('#noMembershipText').textContent=error?'Üyelik kaydı okunamadı: '+error.message:'Bu e-posta adresi için aktif üyelik bulunamadı.';$('#noMembership').classList.remove('hidden');return}member=data;renderMember();await loadRenewals()}function renderMember(){const d=daysUntil(member.valid_until),expired=d<0,soon=!expired&&d<=30;$('#content').classList.remove('hidden');$('#photo').src=member.photo_url||'assets/club-logo.png';$('#name').textContent=member.full_name;$('#type').textContent=member.membership_type||'Yetişkin Üye';$('#number').textContent=member.membership_number;$('#approved').textContent=fmt(member.approved_at);$('#valid').textContent=fmt(member.valid_until);const s=$('#status');s.textContent=expired?'Süresi Doldu':soon?`Yenilemeye ${d} gün kaldı`:'Aktif';s.className='status '+(expired?'expired':soon?'soon':'active');if(d<=30)$('#renewBtn').classList.remove('hidden');$('#card').innerHTML=`${member.photo_url?`<img class="card-photo" src="${esc(member.photo_url)}">`:''}<h2>KARAGÜMRÜK HENTBOL</h2><p class="small">ÜYELİK KARTI / MEMBERSHIP CARD</p><div class="number">${esc(member.membership_number)}</div><p><strong>${esc(member.full_name)}</strong><br>${esc(member.membership_type||'Yetişkin Üye')}</p><p class="small">Geçerlilik: ${fmt(member.valid_until)}</p>`}async function loadRenewals(){const {data,error}=await db.from('membership_renewals').select('*').eq('membership_request_id',member.id).order('created_at',{ascending:false});if(error)return $('#renewals').innerHTML='<p>Yenileme talepleri yüklenemedi.</p>';$('#renewals').innerHTML=(data||[]).length?data.map(r=>`<div class="renewal"><strong>${fmt(r.created_at)}</strong> · ${esc({new:'Yeni',reviewing:'İnceleniyor',accepted:'Kabul',rejected:'Red'}[r.status]||r.status)}<br><small>Mevcut bitiş: ${fmt(r.current_valid_until)}${r.new_valid_until?' · Yeni bitiş: '+fmt(r.new_valid_until):''}</small></div>`).join(''):'<p>Henüz yenileme talebi yok.</p>'}$('#renewBtn').onclick=async()=>{if(!member)return;const pending=await db.from('membership_renewals').select('id').eq('membership_request_id',member.id).in('status',['new','reviewing']).limit(1);if(pending.data?.length)return toast('Zaten değerlendirmede olan bir yenileme talebiniz var.',true);if(!confirm('Üyeliğinizi 1 yıl yenilemek için talep gönderilsin mi?'))return;const {error}=await db.from('membership_renewals').insert({membership_request_id:member.id,member_email:member.email,membership_number:member.membership_number,current_valid_until:member.valid_until,requested_years:1});if(error)return toast(error.message,true);toast('Yenileme talebiniz yönetime gönderildi.');await loadRenewals()};$('#emailCard').onclick=async()=>{const {error}=await db.functions.invoke('send-membership-approved-v3',{body:member});toast(error?'Kart gönderilemedi: '+error.message:'Kart e-posta adresinize gönderildi.',!!error)};$('#printCard').onclick=()=>{const w=window.open('','_blank');w.document.write(`<html><head><title>${esc(member.membership_number)}</title><style>body{font-family:Arial;background:#eee;display:grid;place-items:center;height:100vh}.c{width:860px;max-width:95%;background:linear-gradient(135deg,#090909 0 72%,#7a0000 72%);color:white;padding:35px;border-radius:20px}.p{width:130px;height:160px;object-fit:cover;float:right;border:4px solid white;border-radius:12px}</style></head><body><div class=c>${member.photo_url?`<img class=p src="${esc(member.photo_url)}">`:''}<h1>KARAGÜMRÜK HENTBOL</h1><p>ÜYELİK KARTI / MEMBERSHIP CARD</p><h2>${esc(member.full_name)}</h2><h2>${esc(member.membership_number)}</h2><p>${esc(member.membership_type||'Yetişkin Üye')}</p><p>Geçerlilik: ${fmt(member.valid_until)}</p></div><script>onload=()=>setTimeout(()=>print(),300)<\/script></body></html>`);w.document.close()};$('#logout').onclick=async()=>{await db.auth.signOut();location.href='member-login.html'};load();</script></body></html>
