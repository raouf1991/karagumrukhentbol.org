<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Karagümrük Hentbol Admin</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#eef1f5;color:#111}.hidden{display:none!important}button,input,textarea,select{font:inherit}.login{min-height:100vh;display:grid;place-items:center;padding:20px}.login-card,.panel{background:#fff;border-radius:14px;box-shadow:0 10px 35px #0002}.login-card{width:min(420px,100%);padding:32px}.login-card img{width:90px;display:block;margin:0 auto 18px}.login-card h1{text-align:center}.field{display:grid;gap:7px;margin:12px 0}.field input,.field textarea,.field select{padding:12px;border:1px solid #ccd1d8;border-radius:8px;width:100%}.btn{border:0;border-radius:8px;padding:12px 16px;font-weight:700;cursor:pointer}.primary{background:#d50909;color:#fff}.dark{background:#151515;color:#fff}.danger{background:#8b0000;color:#fff}.layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{background:#111;color:#fff;padding:24px;position:sticky;top:0;height:100vh}.side img{width:80px;background:#fff;border-radius:50%}.side button,.side a{display:block;width:100%;text-align:left;color:#fff;background:none;border:0;padding:11px 0;text-decoration:none;cursor:pointer}.main{padding:26px}.top{display:flex;justify-content:space-between;gap:15px;align-items:center}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:20px 0}.card{background:#fff;padding:18px;border-radius:12px;box-shadow:0 4px 15px #0001}.card strong{font-size:28px}.panel{padding:20px;margin:18px 0}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:12px 18px;border-radius:8px;opacity:0;transform:translateY(10px);transition:.2s}.toast.show{opacity:1;transform:none}.error{color:#a00000;margin-top:10px;min-height:22px}.status{font-size:13px;color:#666;text-align:center;margin-top:8px}@media(max-width:900px){.layout{grid-template-columns:1fr}.side{height:auto;position:static}.cards,.grid2{grid-template-columns:1fr}.main{padding:15px}}
</style>
</head>
<body>
<section id="loginView" class="login"><form id="loginForm" class="login-card"><img src="assets/club-logo.png" alt=""><h1>Yönetim Paneli</h1><div class="field"><label>E-posta</label><input id="email" type="email" autocomplete="username" required></div><div class="field"><label>Şifre</label><input id="password" type="password" autocomplete="current-password" required></div><button id="loginButton" class="btn primary" type="submit" style="width:100%">Giriş Yap</button><div id="loginError" class="error"></div><div id="scriptStatus" class="status">Sistem yükleniyor...</div><p style="text-align:center"><a href="index.html">Siteye dön</a></p></form></section>
<section id="appView" class="layout hidden"><aside class="side"><img src="assets/club-logo.png" alt=""><h2>Karagümrük</h2><button data-tab="dashboard">Dashboard</button><button data-tab="settings">Site Ayarları</button><button data-tab="news">Haberler</button><button data-tab="matches">Maçlar</button><button data-tab="players">Oyuncular</button><button data-tab="academy">Akademi</button><button data-tab="membership">Üyelik</button><button data-tab="sponsors">Sponsorlar</button><a href="index.html">Siteyi Aç</a><button id="logout">Çıkış</button></aside><main class="main"><div class="top"><div><h1 id="pageTitle">Dashboard</h1><small id="userEmail"></small></div><button id="refresh" class="btn dark">Yenile</button></div>
<div id="dashboard" class="tab"><div class="cards"><div class="card"><span>Haber</span><br><strong id="countNews">0</strong></div><div class="card"><span>Maç</span><br><strong id="countMatches">0</strong></div><div class="card"><span>Oyuncu</span><br><strong id="countPlayers">0</strong></div><div class="card"><span>Yeni Başvuru</span><br><strong id="countApps">0</strong></div></div></div>
<div id="settings" class="tab hidden"><div class="panel"><h2>Site Ayarları</h2><form id="settingsForm" class="grid2"><div class="field"><label>Türkçe ana başlık</label><input name="hero_title_tr"></div><div class="field"><label>İngilizce ana başlık</label><input name="hero_title_en"></div><div class="field"><label>Türkçe açıklama</label><textarea name="hero_text_tr"></textarea></div><div class="field"><label>İngilizce açıklama</label><textarea name="hero_text_en"></textarea></div><div class="field"><label>İletişim e-postası</label><input name="contact_email"></div><div class="field"><label>IBAN</label><input name="donation_iban"></div><div class="field"><label>Bağış linki</label><input name="donation_link"></div><div class="field"><label>Logo boyutu</label><input type="number" name="club_logo_size"></div><div class="actions"><button class="btn primary">Kaydet</button></div></form></div></div>
<div id="news" class="tab hidden"><div class="panel"><h2>Haber Ekle</h2><form id="newsForm" class="grid2"><div class="field"><label>Başlık TR</label><input name="title_tr" required></div><div class="field"><label>Başlık EN</label><input name="title_en" required></div><div class="field"><label>Metin TR</label><textarea name="body_tr"></textarea></div><div class="field"><label>Metin EN</label><textarea name="body_en"></textarea></div><div class="field"><label>Görsel URL</label><input name="image_url"></div><label><input type="checkbox" name="published" checked> Yayında</label><div class="actions"><button class="btn primary">Haberi Ekle</button></div></form><div id="newsList"></div></div></div>
<div id="matches" class="tab hidden"><div class="panel"><h2>Maç Ekle</h2><form id="matchForm" class="grid2"><div class="field"><label>Rakip</label><input name="opponent" required></div><div class="field"><label>Tarih ve saat</label><input type="datetime-local" name="match_date" required></div><div class="field"><label>Salon</label><input name="venue"></div><div class="field"><label>Durum</label><select name="status"><option value="upcoming">Yaklaşan</option><option value="finished">Bitti</option><option value="cancelled">İptal</option></select></div><div class="field"><label>Ev skoru</label><input type="number" name="home_score"></div><div class="field"><label>Deplasman skoru</label><input type="number" name="away_score"></div><div class="actions"><button class="btn primary">Maçı Ekle</button></div></form><div id="matchList"></div></div></div>
<div id="players" class="tab hidden"><div class="panel"><h2>Oyuncu Ekle</h2><form id="playerForm" class="grid2"><div class="field"><label>Ad Soyad</label><input name="name" required></div><div class="field"><label>Forma No</label><input type="number" name="number"></div><div class="field"><label>Pozisyon TR</label><input name="position_tr"></div><div class="field"><label>Pozisyon EN</label><input name="position_en"></div><div class="field"><label>Görsel URL</label><input name="image_url"></div><label><input type="checkbox" name="active" checked> Aktif</label><div class="actions"><button class="btn primary">Oyuncu Ekle</button></div></form><div id="playerList"></div></div></div>
<div id="academy" class="tab hidden"><div class="panel"><h2>Akademi Başvuruları</h2><div id="academyList"></div></div></div>
<div id="membership" class="tab hidden"><div class="panel"><h2>Üyelik Başvuruları</h2><div id="membershipList"></div></div></div>
<div id="sponsors" class="tab hidden"><div class="panel"><h2>Sponsor Ekle</h2><form id="sponsorForm" class="grid2"><div class="field"><label>Ad</label><input name="name" required></div><div class="field"><label>Logo URL</label><input name="logo_url"></div><div class="field"><label>Web sitesi</label><input name="website_url"></div><div class="field"><label>Sıra</label><input type="number" name="sort_order" value="0"></div><div class="actions"><button class="btn primary">Sponsor Ekle</button></div></form><div id="sponsorList"></div></div></div>
</main></section><div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js" onload="document.getElementById('scriptStatus').textContent='Supabase yüklendi';" onerror="document.getElementById('scriptStatus').textContent='Supabase yüklenemedi';document.getElementById('loginError').textContent='Bağlantı dosyası yüklenemedi. İnternet bağlantısını kontrol edin.';"></script>
<script src="supabase-config.js?v=20260719"></script>
<script src="admin.js?v=20260719-2" onload="document.getElementById('scriptStatus').textContent='Sistem hazır';" onerror="document.getElementById('scriptStatus').textContent='admin.js yüklenemedi';document.getElementById('loginError').textContent='Yönetim dosyası yüklenemedi.';"></script>
</body></html>
