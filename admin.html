<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Karagümrük CMS</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f2f3f5;color:#151515}.hidden{display:none!important}.login{min-height:100vh;display:grid;place-items:center;background:#111}.login-card,.panel{background:#fff;border-radius:14px;padding:24px;box-shadow:0 10px 35px #0002}.login-card{width:min(420px,92vw)}input,textarea,select,button{font:inherit}input,textarea,select{width:100%;padding:11px;border:1px solid #ccc;border-radius:8px}textarea{min-height:90px}button{border:0;border-radius:8px;padding:11px 16px;font-weight:700;cursor:pointer}.primary{background:#d71920;color:#fff}.dark{background:#222;color:#fff}.danger{background:#9d1117;color:#fff}.layout{display:grid;grid-template-columns:230px 1fr;min-height:100vh}.side{background:#0c0c0c;color:#fff;padding:22px}.side img{width:90px;background:#fff;border-radius:50%}.side button,.side a{display:block;width:100%;margin-top:8px;padding:11px;text-align:left;background:#181818;color:#fff;border-radius:7px;text-decoration:none}.main{padding:28px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0}.tabs button.active{background:#d71920;color:#fff}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field{display:grid;gap:6px}.panel{margin-bottom:18px}.list{display:grid;gap:10px;margin-top:14px}.item{background:#f7f7f7;border:1px solid #ddd;border-radius:10px;padding:12px}.item-head{display:flex;justify-content:space-between;gap:10px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.msg{padding:10px;border-radius:8px;margin:10px 0;background:#e8f5e9}.error{background:#ffebee;color:#8b0000}.count{font-size:28px;font-weight:800}@media(max-width:800px){.layout{grid-template-columns:1fr}.side{display:none}.grid{grid-template-columns:1fr}.main{padding:15px}}</style></head><body><section id="login" class="login"><form id="loginForm" class="login-card"><img src="assets/club-logo.png" alt="" style="width:95px"><h1>Yönetim Paneli</h1><div id="loginMsg"></div><div class="field"><label>E-posta</label><input id="email" type="email" required></div><div class="field" style="margin-top:12px"><label>Şifre</label><input id="password" type="password" required></div><button class="primary" style="width:100%;margin-top:16px">Giriş Yap</button></form></section><section id="app" class="layout hidden"><aside class="side"><img src="assets/club-logo.png"><h2>Karagümrük CMS</h2><a href="index.html">Siteyi Aç</a><button id="logout">Çıkış</button></aside><main class="main"><div class="top"><div><h1>Site Yönetimi</h1><small id="userEmail"></small></div><button id="refresh" class="dark">Yenile</button></div><div id="globalMsg"></div><div class="tabs"><button data-tab="dashboard" class="active">Dashboard</button><button data-tab="settings">Ana Sayfa</button><button data-tab="news">Haberler</button><button data-tab="matches">Maçlar</button><button data-tab="players">Oyuncular</button><button data-tab="academy">Akademi</button><button data-tab="membership">Üyelik</button><button data-tab="sponsors">Sponsorlar</button></div><section id="dashboard" class="tab"><div class="grid"><div class="panel"><div class="count" id="newsCount">0</div>Haber</div><div class="panel"><div class="count" id="matchCount">0</div>Maç</div><div class="panel"><div class="count" id="playerCount">0</div>Oyuncu</div><div class="panel"><div class="count" id="applicationCount">0</div>Yeni Başvuru</div></div></section><section id="settings" class="tab hidden"><form id="settingsForm" class="panel"><h2>Ana Sayfa Ayarları</h2><div class="grid"><div class="field"><label>Kulüp logo boyutu</label><input name="club_logo_size" type="number"></div><div class="field"><label>Vitorra logo genişliği</label><input name="vitorra_logo_width" type="number"></div><div class="field"><label>Başlık boyutu</label><input name="hero_title_size" type="number"></div><div class="field"><label>Banner yüksekliği</label><input name="hero_min_height" type="number"></div><div class="field"><label>Türkçe başlık</label><input name="hero_title_tr"></div><div class="field"><label>İngilizce başlık</label><input name="hero_title_en"></div><div class="field"><label>Türkçe açıklama</label><textarea name="hero_text_tr"></textarea></div><div class="field"><label>İngilizce açıklama</label><textarea name="hero_text_en"></textarea></div><div class="field"><label>IBAN</label><input name="donation_iban"></div><div class="field"><label>Bağış linki</label><input name="donation_link"></div><div class="field"><label>İletişim e-postası</label><input name="contact_email"></div><div class="field"><label><input name="show_partner_badge" type="checkbox" style="width:auto"> Partner kutusu</label><label><input name="show_quick_links" type="checkbox" style="width:auto"> Hızlı bağlantılar</label></div></div><button class="primary" style="margin-top:14px">Kaydet</button></form></section><section id="news" class="tab hidden"><form id="newsForm" class="panel"><h2>Haber Ekle</h2><div class="grid"><input name="title_tr" placeholder="Türkçe başlık" required><input name="title_en" placeholder="İngilizce başlık" required><textarea name="body_tr" placeholder="Türkçe metin"></textarea><textarea name="body_en" placeholder="İngilizce metin"></textarea><input name="image_url" placeholder="Görsel URL"><label><input name="published" type="checkbox" checked style="width:auto"> Yayında</label></div><button class="primary">Haberi Kaydet</button></form><div id="newsList" class="list"></div></section><section id="matches" class="tab hidden"><form id="matchForm" class="panel"><h2>Maç Ekle</h2><div class="grid"><input name="opponent" placeholder="Rakip" required><input name="match_date" type="datetime-local" required><input name="venue" placeholder="Salon"><select name="status"><option value="upcoming">Yaklaşan</option><option value="finished">Bitti</option><option value="cancelled">İptal</option></select><input name="home_score" type="number" placeholder="Ev skoru"><input name="away_score" type="number" placeholder="Rakip skoru"></div><button class="primary">Maçı Kaydet</button></form><div id="matchesList" class="list"></div></section><section id="players" class="tab hidden"><form id="playerForm" class="panel"><h2>Oyuncu Ekle</h2><div class="grid"><input name="name" placeholder="Ad Soyad" required><input name="number" type="number" placeholder="Numara"><input name="position_tr" placeholder="Pozisyon TR"><input name="position_en" placeholder="Position EN"><input name="nationality" placeholder="Milliyet"><input name="image_url" placeholder="Görsel URL"><input name="height_cm" type="number" placeholder="Boy cm"><input name="weight_kg" type="number" placeholder="Kilo kg"><label><input name="active" type="checkbox" checked style="width:auto"> Aktif</label></div><button class="primary">Oyuncuyu Kaydet</button></form><div id="playersList" class="list"></div></section><section id="academy" class="tab hidden"><div class="panel"><h2>Akademi Başvuruları</h2><div id="academyList" class="list"></div></div></section><section id="membership" class="tab hidden"><div class="panel"><h2>Üyelik Başvuruları</h2><div id="membershipList" class="list"></div></div></section><section id="sponsors" class="tab hidden"><form id="sponsorForm" class="panel"><h2>Sponsor Ekle</h2><div class="grid"><input name="name" placeholder="Sponsor adı" required><input name="logo_url" placeholder="Logo URL"><input name="website_url" placeholder="Web sitesi"><input name="sort_order" type="number" value="0"><label><input name="active" type="checkbox" checked style="width:auto"> Aktif</label></div><button class="primary">Kaydet</button></form><div id="sponsorsList" class="list"></div></section></main></section><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="admin.js"></script></body></html>
