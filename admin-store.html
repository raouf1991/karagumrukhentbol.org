<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mağaza Yönetimi | Karagümrük Hentbol</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#eef1f5;color:#111}.hidden{display:none!important}button,input,textarea,select{font:inherit}.login{min-height:100vh;display:grid;place-items:center;padding:20px}.card,.panel{background:#fff;border-radius:14px;box-shadow:0 8px 28px #0002}.login .card{width:min(420px,100%);padding:28px}.layout{display:grid;grid-template-columns:230px 1fr;min-height:100vh}.side{background:#111;color:#fff;padding:24px;position:sticky;top:0;height:100vh}.side img{width:80px;background:#fff;border-radius:50%}.side a,.side button{display:block;color:#fff;text-decoration:none;background:none;border:0;padding:11px 0;cursor:pointer;width:100%;text-align:left}.main{padding:25px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.panel{padding:20px;margin-top:18px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}.field{display:grid;gap:6px}.field input,.field textarea,.field select{padding:11px;border:1px solid #ccd1d8;border-radius:8px;width:100%}.field textarea{min-height:95px}.btn{border:0;border-radius:8px;padding:11px 15px;font-weight:700;cursor:pointer}.red{background:#d50909;color:#fff}.dark{background:#151515;color:#fff}.danger{background:#8b0000;color:#fff}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.list .card{padding:16px;margin:12px 0}.product-row{display:grid;grid-template-columns:100px 1fr auto;gap:14px;align-items:center}.product-row img{width:100px;height:100px;object-fit:cover;border-radius:10px;background:#eee}.actions{display:flex;gap:8px;flex-wrap:wrap}.order-items{background:#f5f5f5;padding:10px;border-radius:8px;line-height:1.6}.status{padding:8px;border-radius:7px}.toast{position:fixed;right:20px;bottom:20px;background:#111;color:#fff;padding:13px 18px;border-radius:8px;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:800px){.layout{grid-template-columns:1fr}.side{height:auto;position:static}.grid{grid-template-columns:1fr}.full{grid-column:auto}.product-row{grid-template-columns:75px 1fr}.product-row .actions{grid-column:1/-1}}</style></head><body><section id="login" class="login"><form id="loginForm" class="card"><img src="assets/club-logo.png" style="width:90px;display:block;margin:auto"><h1>Mağaza Yönetimi</h1><div class="field"><label>E-posta</label><input id="email" type="email" required></div><div class="field"><label>Şifre</label><input id="password" type="password" required></div><button class="btn red" style="width:100%;margin-top:12px">Giriş Yap</button><p id="loginError" style="color:#a00000"></p><p><a href="admin.html">Ana yönetim paneli</a></p></form></section><section id="app" class="layout hidden"><aside class="side"><img src="assets/club-logo.png"><h2>Mağaza</h2><button data-tab="products">Ürünler</button><button data-tab="orders">Siparişler</button><a href="store.html">Mağazayı Aç</a><a href="admin.html">Ana Yönetim</a><button id="logout">Çıkış</button></aside><main class="main"><div class="top"><div><h1 id="title">Ürünler</h1><small id="userEmail"></small></div><button id="refresh" class="btn dark">Yenile</button></div><div id="products" class="tab"><div class="panel"><h2>Ürün Ekle / Düzenle</h2><form id="productForm" class="grid"><input type="hidden" name="id"><div class="field"><label>Ürün adı TR</label><input name="name_tr" required></div><div class="field"><label>Ürün adı EN</label><input name="name_en"></div><div class="field"><label>Açıklama TR</label><textarea name="description_tr"></textarea></div><div class="field"><label>Açıklama EN</label><textarea name="description_en"></textarea></div><div class="field"><label>Kategori</label><select name="category"><option value="jersey">Forma</option><option value="training">Antrenman</option><option value="fan">Taraftar</option><option value="accessory">Aksesuar</option><option value="other">Diğer</option></select></div><div class="field"><label>Ürün görseli</label><input name="image_file" type="file" accept="image/jpeg,image/png,image/webp"><input name="image_url" type="hidden"></div><div class="field"><label>Fiyat (₺)</label><input name="price" type="number" step="0.01" min="0" required></div><div class="field"><label>İndirimli fiyat (isteğe bağlı)</label><input name="sale_price" type="number" step="0.01" min="0"></div><div class="field"><label>Stok</label><input name="stock" type="number" min="0" value="0" required></div><div class="field"><label>Sıra</label><input name="sort_order" type="number" value="0"></div><div class="field"><label>Bedenler (virgülle)</label><input name="sizes_text" placeholder="S, M, L, XL"></div><div class="field"><label>Renkler (virgülle)</label><input name="colors_text" placeholder="Kırmızı, Siyah"></div><label><input name="active" type="checkbox" checked> Yayında</label><label><input name="featured" type="checkbox"> Öne çıkan</label><div class="actions full"><button class="btn red" type="submit">Kaydet</button><button id="cancelEdit" class="btn dark hidden" type="button">Düzenlemeyi İptal Et</button></div></form></div><div id="productList" class="list"></div></div><div id="orders" class="tab hidden"><div class="panel"><h2>Siparişler</h2><div id="orderList">Yükleniyor...</div></div></div></main></section><div id="toast" class="toast"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script><script src="supabase-config.js"></script><script src="admin-store.js?v=20260720-1"></script></body></html>
