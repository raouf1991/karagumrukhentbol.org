name: Generate static news pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/generate-news-pages.mjs'
      - '.github/workflows/generate-news-pages.yml'
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/generate-news-pages.mjs
      - name: Commit generated pages and sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news sitemap.xml
          if git diff --cached --quiet; then
            echo "No SEO page changes"
          else
            git commit -m "Update static news pages and sitemap"
            git push
          fi
